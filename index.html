<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>資料庫</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
color:#222;
}

.dark{
background:#111;
color:#eee;
}

header{
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.toolbar{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
padding:15px;
}

select,input,button{
padding:10px;
font-size:15px;
border-radius:8px;
border:1px solid #ccc;
}

button{
cursor:pointer;
background:#1a73e8;
color:#fff;
border:none;
}

button:hover{
opacity:.9;
}

.random{
background:#34a853;
}

.darkbtn{
background:#444;
}

#pdfCanvas{
display:block;
margin:auto;
background:#fff;
max-width:100%;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.info{
text-align:center;
padding:10px;
font-size:14px;
}

.loading{
text-align:center;
padding:20px;
font-size:18px;
}

@media(max-width:768px){

.toolbar{
flex-direction:column;
}

select,input,button{
width:100%;
}

}

</style>
</head>
<body>

<header>
📚 資料庫
</header>

<div class="toolbar">

<select id="pdfList"></select>

<button onclick="loadSelectedPdf()">
ファイルを開く
</button>

<input
id="pageInput"
type="number"
min="1"
placeholder="页码">

<button onclick="jumpPage()">
移動
</button>

<button
class="random"
onclick="randomPage()">
🎲 ランダム
</button>

<button onclick="prevPage()">
◀前へ
</button>

<button onclick="nextPage()">
次へ▶
</button>

<button
class="darkbtn"
onclick="toggleDark()">
🌙 ダーク
</button>

</div>

<div class="info" id="info">
👉 リポジトリ読込中...
</div>

<div class="loading" id="loading"></div>

<canvas id="pdfCanvas"></canvas>

<script type="module">

import * as pdfjsLib from "./pdfjs/pdf.mjs";

pdfjsLib.GlobalWorkerOptions.workerSrc =
"./pdfjs/pdf.worker.mjs";

const owner="QINGqing-2025";
const repo="pdf-library";

let pdfDoc=null;
let currentPage=1;
let totalPages=0;
let currentPdfUrl="";

const canvas=document.getElementById("pdfCanvas");
const ctx=canvas.getContext("2d");

const info=document.getElementById("info");
const pdfList=document.getElementById("pdfList");
const loading=document.getElementById("loading");

async function loadRepositoryFiles(){

loading.innerHTML="👉 PDFスキャン中...";

try{

const response=await fetch(
`https://api.github.com/repos/${owner}/${repo}/contents`
);

const files=await response.json();

const pdfFiles=
files.filter(f=>
f.name.toLowerCase().endsWith(".pdf")
);

pdfList.innerHTML="";

pdfFiles.forEach(file=>{

const option=
document.createElement("option");

option.value=file.download_url;
option.textContent=file.name;

pdfList.appendChild(option);

});

loading.innerHTML="";

info.innerHTML=
`发现 ${pdfFiles.length} 个PDF文件`;

if(pdfFiles.length){
loadSelectedPdf();
}

}catch(err){

console.error(err);

loading.innerHTML="";

info.innerHTML=
"👉 リポジトリ読込エラー";

}

}

window.loadSelectedPdf=
async function(){

currentPdfUrl=
pdfList.value;

loading.innerHTML=
"👉 PDF読込中...";

try{

const pdf=
await pdfjsLib.getDocument({
url:currentPdfUrl
}).promise;

pdfDoc=pdf;

totalPages=pdf.numPages;

currentPage=1;

renderPage(1);

loading.innerHTML="";

}catch(err){

console.error(err);

loading.innerHTML=
"👉 PDFを読み込めませんでした";

}

}

async function renderPage(page){

const p=
await pdfDoc.getPage(page);

const viewport=
p.getViewport({
scale:1.5
});

canvas.width=
viewport.width;

canvas.height=
viewport.height;

await p.render({
canvasContext:ctx,
viewport
}).promise;

info.innerHTML=
pdfList.options[
pdfList.selectedIndex
].text +

" ｜ 第 " +
page +
" ページ / 全 " +
totalPages +
" ページ";

document
.getElementById("pageInput")
.value=page;

}

window.jumpPage=
function(){

const page=
parseInt(
document
.getElementById("pageInput")
.value
);

if(
page>=1 &&
page<=totalPages
){

currentPage=page;
renderPage(page);

}

}

window.randomPage=
function(){

if(totalPages===0)return;

const page=
Math.floor(
Math.random()*totalPages
)+1;

currentPage=page;

renderPage(page);

}

window.prevPage=
function(){

if(currentPage>1){

currentPage--;

renderPage(currentPage);

}

}

window.nextPage=
function(){

if(currentPage<totalPages){

currentPage++;

renderPage(currentPage);

}

}

window.toggleDark=
function(){

document.body
.classList.toggle("dark");

}

loadRepositoryFiles();

</script>

</body>
</html>
