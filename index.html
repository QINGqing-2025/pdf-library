<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>資料庫</title>

<style>

:root{
--bg:#f5f5f5;
--card:#fff;
--text:#333;
--border:#ddd;
--accent:#1a73e8;
}

.dark{
--bg:#1f1f1f;
--card:#2d2d2d;
--text:#e5e5e5;
--border:#444;
--accent:#4ea1ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--text);
font-family:Arial,sans-serif;
height:100vh;
overflow:hidden;
}

.layout{
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:var(--card);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
}

.header{
padding:15px;
border-bottom:1px solid var(--border);
}

.search{
width:100%;
padding:10px;
border:1px solid var(--border);
border-radius:6px;
}

.stats{
padding:10px 15px;
font-size:13px;
}

.file-list{
flex:1;
overflow:auto;
}

.file-item{
padding:12px 15px;
cursor:pointer;
border-bottom:1px solid var(--border);
}

.file-item:hover{
background:rgba(26,115,232,.08);
}

.file-item.active{
background:rgba(26,115,232,.15);
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.toolbar{
padding:10px;
background:var(--card);
border-bottom:1px solid var(--border);
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

.toolbar button{
padding:8px 12px;
border:none;
border-radius:6px;
background:var(--accent);
color:#fff;
cursor:pointer;
}

.toolbar input{
padding:8px;
width:90px;
}

.viewer{
flex:1;
width:100%;
border:none;
}

.info{
font-size:14px;
}

@media(max-width:768px){

.layout{
flex-direction:column;
}

.sidebar{
width:100%;
height:40%;
}

.main{
height:60%;
}

}

</style>
</head>

<body>

<div class="layout">

<div class="sidebar">

<div class="header">

<h2>📚 資料庫</h2>

<input
id="searchInput"
class="search"
placeholder="搜索 PDF">

</div>

<div
class="stats"
id="stats">
加载中...
</div>

<div
class="file-list"
id="fileList">
</div>

</div>

<div class="main">

<div class="toolbar">

<button onclick="toggleDark()">
🌙 深色模式
</button>

<input
id="pageInput"
type="number"
placeholder="页码">

<button onclick="goPage()">
跳转
</button>

<button onclick="randomPage()">
🎲 随机页
</button>

<span
id="currentInfo"
class="info">
未打开文件
</span>

</div>

<iframe
id="viewer"
class="viewer">
</iframe>

</div>

</div>

<script type="module">

import * as pdfjsLib from "./pdfjs/pdf.mjs";

pdfjsLib.GlobalWorkerOptions.workerSrc =
"./pdfjs/pdf.worker.mjs";

const USERNAME="QINGqing-2025";
const REPO="pdf-library";

let pdfFiles=[];
let filtered=[];
let currentFile=null;
let totalPages=0;

const viewer=document.getElementById("viewer");
const fileList=document.getElementById("fileList");
const stats=document.getElementById("stats");
const searchInput=document.getElementById("searchInput");
const currentInfo=document.getElementById("currentInfo");

async function loadFiles(){

const response=
await fetch(
`https://api.github.com/repos/${USERNAME}/${REPO}/contents`
);

const data=
await response.json();

pdfFiles=data.filter(
f=>
f.type==="file" &&
f.name.toLowerCase().endsWith(".pdf")
);

pdfFiles.sort(
(a,b)=>
a.name.localeCompare(
b.name,
"zh-CN",
{
numeric:true
}
)
);

filtered=[...pdfFiles];

renderList();

}

function renderList(){

fileList.innerHTML="";

stats.innerHTML=
`共 ${filtered.length} 个 PDF`;

filtered.forEach(file=>{

const div=
document.createElement("div");

div.className="file-item";

div.innerHTML=
`📄 ${file.name.replace(".pdf","")}`;

div.onclick=()=>{

document
.querySelectorAll(".file-item")
.forEach(
x=>x.classList.remove("active")
);

div.classList.add("active");

openPdf(file);

};

fileList.appendChild(div);

});

}

async function openPdf(file){

currentFile=file;

const pdfUrl=
`https://qingqing-2025.github.io/pdf-library/${encodeURIComponent(file.name)}`;

try{

const pdf=
await pdfjsLib
.getDocument(pdfUrl)
.promise;

totalPages=
pdf.numPages;

}
catch(err){

console.error(err);

totalPages=0;

}

viewer.src=
pdfUrl;

currentInfo.innerHTML=
`${file.name} ｜ 共 ${totalPages} 页`;

}

window.goPage=function(){

if(!currentFile)return;

let page=
parseInt(
document.getElementById("pageInput").value
);

if(isNaN(page))
page=1;

if(totalPages>0){

page=
Math.max(
1,
Math.min(
page,
totalPages
)
);

}

viewer.src=
`https://qingqing-2025.github.io/pdf-library/${encodeURIComponent(currentFile.name)}#page=${page}`;

};

window.randomPage=function(){

if(
!currentFile ||
!totalPages
){
return;
}

const page=
Math.floor(
Math.random()*totalPages
)+1;

document.getElementById(
"pageInput"
).value=page;

goPage();

};

window.toggleDark=function(){

document.body.classList.toggle(
"dark"
);

};

searchInput.addEventListener(
"input",
function(){

const k=
this.value.toLowerCase();

filtered=
pdfFiles.filter(
f=>
f.name.toLowerCase()
.includes(k)
);

renderList();

});

loadFiles();

</script>

</body>
</html>
